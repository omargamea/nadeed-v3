# ════════════════════════════════════════════════════
# Decap CMS — config.yml
# نضيد — دار الأدب والفكر والمعرفة
#
# TODO قبل الإطلاق — استبدل القيم التالية:
#   repo:     omargamea/nadeed
#   base_url: رابط OAuth proxy (مثال: https://nadeed-oauth.vercel.app)
#             يمكن استخدام: https://github.com/vencax/netlify-cms-github-oauth-provider
#             أو: https://github.com/Decap-CMS/netlify-cms-oauth-provider-node
# ════════════════════════════════════════════════════

backend:
  name: github
  repo: omargamea/nadeed
    branch: main
  base_url: OAUTH_PROXY_URL                   # TODO: استبدل برابط OAuth proxy

# ── الوسائط ──────────────────────────────────────
media_folder: "public/uploads"
public_folder: "/uploads"

# ── إعدادات اللغة ────────────────────────────────
locale: 'ar'

# ── المجموعات ─────────────────────────────────────
collections:

  # ── مقالات ────────────────────────────────────
  - name: "articles"
    label: "المقالات"
    label_singular: "مقال"
    folder: "src/content/articles"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "العنوان"
        name: "title"
        widget: "string"
        hint: "عنوان المقال كاملاً"

      - label: "الوصف"
        name: "description"
        widget: "text"
        hint: "وصف قصير للمقال (يُستخدم في SEO والبطاقة)"

      - label: "المؤلف"
        name: "author"
        widget: "string"

      - label: "التصنيف"
        name: "category"
        widget: "select"
        options:
          - { label: "مقالات", value: "مقالات" }
          - { label: "فكر", value: "فكر" }
          - { label: "نقد", value: "نقد" }
          - { label: "أدب", value: "أدب" }
          - { label: "ثقافة", value: "ثقافة" }
          - { label: "نشر", value: "نشر" }

      - label: "تاريخ النشر"
        name: "publishedAt"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "تاريخ التحديث"
        name: "updatedAt"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false

      - label: "صورة مميزة"
        name: "featuredImage"
        widget: "image"
        required: false
        hint: "صورة رئيسية للمقال (اختياري)"

      - label: "مسودة"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "عند التفعيل لن يُنشر المقال في الموقع"

      - label: "المحتوى"
        name: "body"
        widget: "markdown"

  # ── إصدارات / كتب ─────────────────────────────
  - name: "books"
    label: "الإصدارات"
    label_singular: "إصدار"
    folder: "src/content/books"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "عنوان الإصدار"
        name: "title"
        widget: "string"

      - label: "الوصف"
        name: "description"
        widget: "text"
        hint: "وصف قصير يُعرض في البطاقة وصفحة الإصدار"

      - label: "المؤلف"
        name: "author"
        widget: "string"

      - label: "التصنيف"
        name: "category"
        widget: "select"
        options:
          - { label: "رواية", value: "رواية" }
          - { label: "قصة قصيرة", value: "قصة قصيرة" }
          - { label: "شعر", value: "شعر" }
          - { label: "فكر", value: "فكر" }
          - { label: "نقد", value: "نقد" }
          - { label: "معرفة", value: "معرفة" }

      - label: "سنة النشر"
        name: "year"
        widget: "number"
        value_type: "int"
        min: 2000
        max: 2100

      - label: "صورة الغلاف"
        name: "coverImage"
        widget: "image"
        required: false

      - label: "حالة الإصدار"
        name: "status"
        widget: "select"
        default: "available"
        options:
          - { label: "متاح", value: "available" }
          - { label: "قريباً", value: "coming-soon" }
          - { label: "غير متاح حالياً", value: "unavailable" }

      - label: "ISBN"
        name: "isbn"
        widget: "string"
        required: false
        hint: "الرقم الدولي للكتاب (اختياري)"

      - label: "مسودة"
        name: "draft"
        widget: "boolean"
        default: false

      - label: "المحتوى / نبذة عن الإصدار"
        name: "body"
        widget: "markdown"

  # ── مؤلفون ────────────────────────────────────
  - name: "authors"
    label: "المؤلفون"
    label_singular: "مؤلف"
    folder: "src/content/authors"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "الاسم الكامل"
        name: "name"
        widget: "string"

      - label: "الدور / التخصص"
        name: "role"
        widget: "string"
        hint: "مثال: روائي، شاعرة، ناقد أدبي"

      - label: "نبذة تعريفية"
        name: "bio"
        widget: "text"
        hint: "سيرة ذاتية مختصرة (تُعرض في البطاقة وصفحة المؤلف)"

      - label: "صورة المؤلف"
        name: "image"
        widget: "image"
        required: false

      - label: "مسودة"
        name: "draft"
        widget: "boolean"
        default: false

      - label: "محتوى إضافي"
        name: "body"
        widget: "markdown"
        required: false
        hint: "أعمال، إصدارات، مقالات إضافية — اختياري"

  # ── مجلة نضيد ─────────────────────────────────
  - name: "magazine"
    label: "مجلة نضيد"
    label_singular: "عدد"
    folder: "src/content/magazine"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "عنوان العدد"
        name: "title"
        widget: "string"

      - label: "رقم العدد"
        name: "issueNumber"
        widget: "number"
        value_type: "int"
        min: 1

      - label: "وصف العدد"
        name: "description"
        widget: "text"

      - label: "تاريخ النشر"
        name: "publishedAt"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "صورة الغلاف"
        name: "coverImage"
        widget: "image"
        required: false

      - label: "مسودة"
        name: "draft"
        widget: "boolean"
        default: false

      - label: "محتوى العدد"
        name: "body"
        widget: "markdown"
        hint: "محتوى صفحة العدد الكاملة — مقالات، أقسام، تفاصيل"
