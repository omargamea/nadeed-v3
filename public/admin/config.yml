backend:
  name: github
  repo: "omargamea/nadeed-v3"
  branch: "main"
  site_domain: "nadeed.vercel.app"
  base_url: "https://nadeed-oauth.vercel.app"
  auth_endpoint: "api/auth"
media_folder: "public/uploads"
public_folder: "/uploads"

locale: "ar"

collections:
  - name: "articles"
    label: "المقالات"
    folder: "src/content/articles"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "العنوان"
        name: "title"
        widget: "string"
      - label: "الوصف"
        name: "description"
        widget: "text"
      - label: "المؤلف"
        name: "author"
        widget: "string"
      - label: "التصنيف"
        name: "category"
        widget: "string"
      - label: "تاريخ النشر"
        name: "publishedAt"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "صورة مميزة"
        name: "featuredImage"
        widget: "image"
        required: false
      - label: "مسودة"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "المحتوى"
        name: "body"
        widget: "markdown"

  - name: "books"
    label: "الإصدارات"
    folder: "src/content/books"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "عنوان الإصدار"
        name: "title"
        widget: "string"
      - label: "الوصف"
        name: "description"
        widget: "text"
      - label: "المؤلف"
        name: "author"
        widget: "string"
      - label: "التصنيف"
        name: "category"
        widget: "string"
      - label: "سنة النشر"
        name: "year"
        widget: "number"
        value_type: "int"
      - label: "صورة الغلاف"
        name: "coverImage"
        widget: "image"
        required: false
      - label: "حالة الإصدار"
        name: "status"
        widget: "select"
        default: "available"
        options:
          - "available"
          - "coming-soon"
          - "unavailable"
      - label: "ISBN"
        name: "isbn"
        widget: "string"
        required: false
      - label: "مسودة"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "المحتوى"
        name: "body"
        widget: "markdown"

  - name: "authors"
    label: "المؤلفون"
    folder: "src/content/authors"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "الاسم الكامل"
        name: "name"
        widget: "string"
      - label: "الدور"
        name: "role"
        widget: "string"
      - label: "نبذة تعريفية"
        name: "bio"
        widget: "text"
      - label: "صورة المؤلف"
        name: "image"
        widget: "image"
        required: false
      - label: "مسودة"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "محتوى إضافي"
        name: "body"
        widget: "markdown"
        required: false

  - name: "magazine"
    label: "مجلة نضيد"
    folder: "src/content/magazine"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "عنوان العدد"
        name: "title"
        widget: "string"
      - label: "رقم العدد"
        name: "issueNumber"
        widget: "number"
        value_type: "int"
      - label: "وصف العدد"
        name: "description"
        widget: "text"
      - label: "تاريخ النشر"
        name: "publishedAt"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "صورة الغلاف"
        name: "coverImage"
        widget: "image"
        required: false
      - label: "مسودة"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "المحتوى"
        name: "body"
        widget: "markdown"






